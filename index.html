<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>Arcos NC · Hualpén</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ============ VISTA: LISTA DE ARCOS ============ -->
    <section id="vista-lista" class="vista">

        <header class="header">
            <div class="header-tag">HUALPÉN</div>
            <h1 class="title">Arcos NC</h1>
            <p class="subtitle">Rutas no comerciales · Consulta para conductores</p>
        </header>

        <div class="filtros">
            <input
                type="search"
                id="busqueda"
                class="busqueda"
                placeholder="Buscar terminal, calle o servicio…"
                autocomplete="off"
            />

            <div class="filtros-row">
                <select id="filtro-terminal-inicio" class="select">
                    <option value="">Desde · todos</option>
                </select>
                <select id="filtro-terminal-fin" class="select">
                    <option value="">Hasta · todos</option>
                </select>
            </div>

            <select id="filtro-servicio" class="select">
                <option value="">Servicio · todos</option>
            </select>
        </div>

        <div class="resultados-meta">
            <span id="contador" class="contador">— arcos</span>
            <button id="limpiar" class="link">Limpiar filtros</button>
        </div>

        <ul id="lista" class="lista" role="list">
            <li class="vacio">Cargando…</li>
        </ul>

    </section>

    <!-- ============ VISTA: DETALLE DE UN ARCO ============ -->
    <section id="vista-detalle" class="vista oculta">

        <header class="header-detalle">
            <button id="btn-volver" class="btn-volver" aria-label="Volver al listado">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5"/><path d="m12 19-7-7 7-7"/>
                </svg>
            </button>
            <div class="header-detalle-text">
                <h2 class="title-detalle" id="detalle-titulo"></h2>
                <p class="subtitle-detalle" id="detalle-subtitulo"></p>
            </div>
        </header>

        <!-- Placeholder donde irá el mapa en la siguiente iteración -->
        <div id="placeholder-mapa" class="placeholder-mapa">
            <div class="placeholder-icono">▭</div>
            <p class="placeholder-titulo">Espacio para el mapa</p>
            <p class="placeholder-sub">Próxima iteración: Leaflet + polyline</p>
        </div>

        <div class="recorrido">
            <h3 class="section-title">Recorrido</h3>
            <ol id="lista-calles" class="lista-calles"></ol>
            <div id="notas" class="notas oculto"></div>
        </div>

    </section>

    <script src="app.js"></script>
</body>
</html>
